<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/main.css" />
    <title>Edit venue page</title>
  </head>
  <body>
    <!-- NAVIGATION BAR -->
    <header>
      <nav class="navigation-bar">
        <a href="/index.html"
          ><img class="logo" src="/img/jkpgcity.png" alt="Logo"
        /></a>
        <ul class="navigation-menu">
          <li class="add-venue-menu"><a href="/addvenue.html">ADD VENUE</a></li>
        </ul>
      </nav>
    </header>

    <!-- EDIT VENUE -->
    <div>
      <div class="login-container">
        <h1 class="login-text">EDIT VENUE</h1>
        <form id="edit-venue-form">
          <input
            class="add-venue-input"
            type="text"
            name="name"
            placeholder="Name"
          />
          <input
            class="add-venue-input"
            type="text"
            name="website-url"
            placeholder="Website URL"
          />
          <input
            class="add-venue-input"
            type="text"
            name="image-url"
            placeholder="Image URL"
          />
          <select name="district" id="add-district">
            <option value="District">Select a district</option>
            <option value="Öster">Öster</option>
            <option value="Väster">Väster</option>
            <option value="Atollen">Atollen</option>
            <option value="Tändsticksområdet">Tändsticksområdet</option>
            <option value="Okänd">Okänd</option>
          </select>
          <select name="venue" id="venue-type">
            <option value="Venue">Select a venue type</option>
            <option value="shop">Shop</option>
            <option value="service">Service</option>
          </select>
          <div class="submit-container">
            <input class="submit-login" type="submit" value="Edit venue" />
          </div>
        </form>
      </div>
    </div>
    <script type="module" src="/client.js"></script>
  </body>
</html>
